# Spec produzione ideadiluce-platform
#
# Domini:
#   www.ideadiluce.it (+ ideadiluce.it) → shop (storefront)
#   api.ideadiluce.it                   → api
#   manage.ideadiluce.it                → admin (backoffice)
#
# DNS: se NON usi DigitalOcean DNS, rimuovi "zone:" da ogni dominio e crea CNAME manuali
#      (Networking → DO mostra i target). Poi verifica certificati SSL in Networking.
#
# Upload: Settings → App Spec → Download prima, poi merge con questo file
# CLI:    doctl apps update <APP_ID> --spec .do/app.platform.yaml
#
# DATABASE (creato a mano su DO):
#   Nel repo: DATABASE_URL = SECRET (valore solo in UI DO, mai committato).
#   Lo spec scaricato da DO mostra EV[...] — è normale, DO decripta a build/run.
#   Alternativa: blocco databases + value: ${postgres.DATABASE_URL} (vedi commento sotto).
#   NON serve HUB_DATABASE_URL: hub:generate/migrate la derivano da DATABASE_URL.
#
#   Verifica: api → Environment → DATABASE_URL deve essere la connection string completa
#   (Databases → ideadiluce → Connection details → URI).

name: ideadiluce-platform
region: fra

features:
  - buildpack-stack=ubuntu-22

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

domains:
  - domain: www.ideadiluce.it
    type: PRIMARY
    zone: ideadiluce.it
  - domain: ideadiluce.it
    type: ALIAS
    zone: ideadiluce.it
  - domain: api.ideadiluce.it
    type: ALIAS
    zone: ideadiluce.it
  - domain: manage.ideadiluce.it
    type: ALIAS
    zone: ideadiluce.it

# path "/" su host diversi — nessun conflitto (authority.exact)
ingress:
  rules:
    - component:
        name: api
      match:
        authority:
          exact: api.ideadiluce.it
        path:
          prefix: /
    - component:
        name: admin
      match:
        authority:
          exact: manage.ideadiluce.it
        path:
          prefix: /
    - component:
        name: shop
      match:
        authority:
          exact: www.ideadiluce.it
        path:
          prefix: /
    - match:
        authority:
          exact: ideadiluce.it
        path:
          prefix: /
      redirect:
        authority: www.ideadiluce.it
        redirect_code: 302
    - match:
        authority:
          exact: ${STARTER_DOMAIN}
        path:
          prefix: /
      redirect:
        authority: www.ideadiluce.it
        redirect_code: 302

# Se il DB è nello spec DO (Settings → Download), decommenta e usa ${postgres.DATABASE_URL} su api:
# databases:
#   - name: postgres
#     engine: PG
#     version: "16"
#     production: true
#     cluster_name: <nome-cluster-da-DO>
#     db_name: ideadiluce
#     db_user: ideadiluce

services:
  - name: shop
    source_dir: /
    environment_slug: node-js
    github:
      repo: rzaccardi/ideadiluce-pwa
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 3000
    health_check:
      http_path: /
      initial_delay_seconds: 45
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 3
    build_command: npm ci --ignore-scripts && npm run build --workspace=client
    run_command: npm run start --workspace=client
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: API_URL
        value: ${api.PRIVATE_URL}
        scope: RUN_TIME
      - key: API_URL
        value: https://api.ideadiluce.it
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_API_URL
        value: https://api.ideadiluce.it
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_ARFLY_MEDIA_BASE_URL
        value: https://tlbdb.odoo.com
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_SITE_URL
        value: https://www.ideadiluce.it
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        scope: BUILD_TIME
        type: SECRET

  - name: api
    source_dir: /
    environment_slug: node-js
    github:
      repo: rzaccardi/ideadiluce-pwa
      branch: main
      deploy_on_push: true
    instance_count: 2
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 8080
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      failure_threshold: 3
    build_command: npm ci && npm run db:generate --workspace=server && npm run hub:generate && npm run build:server && npm run db:deploy && npm run hub:migrate
    run_command: node server/dist/server.js
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: CLIENT_ORIGIN
