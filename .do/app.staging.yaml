# Idea di Luce — STAGING (branch staging, DB dev)
#
# Tre componenti separati come produzione: api + shop + admin
#
#   doctl apps create --spec .do/app.staging.yaml
# Produzione: .do/app.yaml

name: ideadiluce-pwa-staging
region: fra1

features:
  - buildpack-stack=ubuntu-22

alerts:
  - rule: DEPLOYMENT_FAILED

ingress:
  rules:
    - component:
        name: shop
      match:
        path:
          prefix: /

databases:
  - name: postgres
    engine: PG
    version: "16"
    production: false

services:
  - name: api
    source_dir: /
    environment_slug: node-js
    github:
      repo: rzaccardi/ideadiluce-pwa
      branch: staging
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 8080
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      failure_threshold: 3
    build_command: npm ci --include=dev && npm run db:generate --workspace=server && npm run hub:generate && npm run build:server && npm run db:deploy && npm run hub:migrate
    run_command: node server/dist/server.js
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        value: ${postgres.DATABASE_URL}
        scope: RUN_AND_BUILD_TIME
      - key: CLIENT_ORIGIN
        value: ${shop.PUBLIC_URL}
      - key: ADMIN_ORIGIN
        value: ${admin.PUBLIC_URL}
      - key: CHECKOUT_REDIRECT_BASE
        value: ${shop.PUBLIC_URL}
      - key: APP_PUBLIC_URL
        value: ${shop.PUBLIC_URL}
      - key: PUBLIC_SITE_URL
        value: https://shop.ideadiluce.it
      - key: ODOO_CATALOG_ENABLED
        value: "true"
      - key: ODOO_CATALOG_BASE_URL
        value: https://tlbdb.odoo.com
      - key: ODOO_WEBSITE_ID
        value: "2"
      - key: ODOO_ENABLED
        value: "true"
      - key: ODOO_URL
        value: https://tlbdb.odoo.com/odoo
      - key: ODOO_XMLRPC_URL
        value: https://tlbdb.odoo.com
      - key: STRIPE_ENABLED
        value: "true"
        scope: RUN_TIME
      - key: ODOO_CATALOG_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ODOO_DB
        scope: RUN_TIME
        type: SECRET
      - key: ODOO_USERNAME
        scope: RUN_TIME
        type: SECRET
      - key: ODOO_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET

  - name: shop
    source_dir: /
    environment_slug: node-js
    github:
      repo: rzaccardi/ideadiluce-pwa
      branch: staging
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 3000
    health_check:
      http_path: /
      initial_delay_seconds: 45
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 3
    build_command: npm ci --ignore-scripts && npm run build --workspace=client
    run_command: npm run start --workspace=client
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: API_URL
        value: ${api.PRIVATE_URL}
        scope: RUN_TIME
      - key: API_URL
        value: ${api.PUBLIC_URL}
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_API_URL
        value: ${api.PUBLIC_URL}
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_ODOO_MEDIA_BASE_URL
        value: https://tlbdb.odoo.com
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_SITE_URL
        value: https://shop.ideadiluce.it
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        scope: BUILD_TIME
        type: SECRET

static_sites:
  - name: admin
    source_dir: /
    environment_slug: node-js
    github:
      repo: rzaccardi/ideadiluce-pwa
      branch: staging
      deploy_on_push: true
    build_command: npm ci --include=dev --ignore-scripts && npm run build --workspace=admin
    output_dir: admin/dist
    index_document: index.html
    catchall_document: index.html
    envs:
      - key: VITE_API_URL
        value: ${api.PUBLIC_URL}
        scope: BUILD_TIME
      - key: VITE_STOREFRONT_URL
        value: https://shop.ideadiluce.it
        scope: BUILD_TIME
