document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

5\" fit=\"cover\" src=\"{{ p.img }}\" placeholder=\"\" style=\"display:block;width:100%;aspect-ratio:1/1;margin-bottom:12px;\"><\u002Fimage-slot>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#8b919b;margin-bottom:4px;\">{{ p.code }}<\u002Fdiv>\n              <div style=\"font-size:13.5px;font-weight:600;line-height:1.35;margin-bottom:11px;min-height:36px;\">{{ p.name }}<\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px;\">\n                <sc-for list=\"{{ p.specs }}\" as=\"s\" hint-placeholder-count=\"3\">\n                  <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;background:#f0f2f5;color:#3f4651;border-radius:4px;padding:3px 7px;\">{{ s }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-size:16px;font-weight:800;\">{{ p.price }}<\u002Fspan><span style=\"font-size:12px;font-weight:700;color:#fff;background:#d9831a;border-radius:5px;padding:7px 13px;cursor:pointer;\">Aggiungi<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- infinite scroll sentinel / loader -->\n      <sc-if value=\"{{ hasMore }}\" hint-placeholder-val=\"{{ true }}\">\n        <div ref=\"{{ sentinel }}\" style=\"text-align:center;padding:34px 0 10px;\">\n          <button onclick=\"{{ loadMore }}\" style=\"background:#fff;border:1px solid #cfd5dc;border-radius:8px;padding:13px 30px;font-family:inherit;font-size:14px;font-weight:700;color:#14161b;cursor:pointer;\" style-hover=\"border-color:#14161b;\">Carica altri prodotti<\u002Fbutton>\n          <div style=\"font-size:12px;color:#9298a3;margin-top:10px;\">{{ shownLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ allLoaded }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;padding:34px 0 10px;font-size:13.5px;color:#9298a3;\">Hai visto tutti i prodotti di questa selezione.<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- footer -->\n  <div style=\"background:#16130d;color:#9a8e78;\">\n    <div style=\"max-width:1320px;margin:0 auto;padding:24px 48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;\">\n      <div style=\"font-size:12.5px;\">TLB Italy Srl · P.IVA IT17245551001 · Via Appia Pignatelli 450, Roma<\u002Fdiv>\n      <div style=\"font-size:12.5px;\">Non trovi un prodotto? <span style=\"color:#f0ad57;font-weight:700;\">Invia foto, EAN o codice<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { tab: 'all', count: 9, filtersOpen: true };\n\n  base(){\n    const D = (brand,name,sub,price,img) => ({world:'design',brand,name,sub,price,img});\n    const T = (code,name,specs,price,img,avail) => ({world:'tech',code,name,specs,price,img,avail});\n    const IM = (typeof window!=='undefined' && window.IDL_IMG) || {};\n    const im = (k) => IM[k] || ('images/'+k+'.png');\n    return [\n      D('ARTEMIDE','Eclisse','Tavolo · Vico Magistretti','€ 215',im('lamp-sphere')),\n      T('OSRAM · 4058075609907','LED R7s 118mm dimmerabile',['R7s','12W','2700K'],'€ 14,90',im('prod-r7s'),'● Disponibile'),\n      D('FLOS','Ariette','Parete / Soffitto · Tobia Scarpa','€ 590',im('lamp-applique')),\n      T('MEAN WELL · 48042562','Alimentatore DC LED 60W IP67',['60W','1050mA','IP67'],'€ 42,00',im('prod-driver'),'● Ultime unità'),\n      D('ARTEMIDE','Calipso','Sospensione · Neil Poulton','€ 690',im('lamp-pendant')),\n      T('PHILIPS · 929001844303','MASTER LEDspot GU5.3 MR16',['GU5.3','6.5W','3000K'],'€ 9,40',im('prod-spot'),'● Disponibile'),\n      D('FONTANAARTE','Bilia','Tavolo · Gio Ponti','€ 410',im('lamp-table')),\n      T('LEDVANCE · 4058075611573','Tubo LED T8 120cm G13',['G13/T8','16W','4000K'],'€ 11,20',im('prod-bulb'),'● Disponibile'),\n      D('FLOS','Snoopy','Tavolo · Castiglioni','€ 690',im('lamp-floor')),\n      T('TLB · 109823','Alimentatore LED 6W 700mA',['6W','700mA','LED'],'€ 12,90',im('prod-driver'),'● Disponibile'),\n      D('DAVIDE GROPPI','Sampei','Terra · Davide Groppi','€ 980',im('lamp-floor')),\n      T('PHILIPS · 8718699764258','LED E27 goccia 8W 806lm',['E27','8W','2700K'],'€ 6,40',im('prod-bulb'),'● Disponibile'),\n      D('ARTEMIDE','Tolomeo','Tavolo · De Lucchi','€ 290',im('lamp-table')),\n      T('TLB · 778210','Dimmer TRIAC LED 230V 200W',['230V','200W','TRIAC'],'€ 24,90',im('prod-driver'),'● Disponibile'),\n      D('FLOS','Arco','Terra · Castiglioni','€ 2.480',im('lamp-floor')),\n      T('TLB · 451120','Portalampada G9 ceramica 230V',['G9','230V','ceramica'],'€ 4,20',im('prod-spot'),'● Su ordinazione'),\n    ];\n  }\n\n  pool(){\n    const b = this.base();\n    const out = [];\n    for(let r=0;r<3;r++){\n      for(let i=0;i<b.length;i++){\n        const src = b[i];\n        const idx = r*b.length + i;\n        const o = Object.assign({}, src);\n        o.slotId = 'cat-'+idx;\n        o.isDesign = o.world==='design';\n        o.isTech = o.world==='tech';\n        if(o.isTech){\n          o.availColor = o.avail.indexOf('Ultime')>=0 ? '#c98a00' : (o.avail.indexOf('ordinazione')>=0 ? '#b3261e' : '#1f9d57');\n        }\n        out.push(o);\n      }\n    }\n    return out;\n  }\n\n  filtered(){\n    const all = this.pool();\n    if(this.state.tab==='design') return all.filter(p=>p.isDesign);\n    if(this.state.tab==='tech') return all.filter(p=>p.isTech);\n    return all;\n  }\n\n  ensureObserver(){\n    if(this._io) return;\n    this._io = new IntersectionObserver((entries)=>{\n      if(entries.some(e=>e.isIntersecting) && !this._busy){\n        const total = this.filtered().length;\n        if(this.state.count < total){\n          this._busy = true;\n          setTimeout(()=>{ this.setState(s=>({count: Math.min(s.count+6, total)})); this._busy=false; }, 250);\n        }\n      }\n    }, {rootMargin:'500px'});\n    if(this._sentinel) this._io.observe(this._sentinel);\n  }\n  componentDidMount(){\n    this.ensureObserver();\n    // images come from window.IDL_IMG (loaded via helmet script); if not ready\n    // at first render, re-render once it's available so data-URIs apply.\n    let tries = 0;\n    const tick = () => {\n      if(window.IDL_IMG){ this.forceUpdate(); return; }\n      if(tries++ < 40) setTimeout(tick, 50);\n    };\n    tick();\n  }\n  componentWillUnmount(){ if(this._io) this._io.disconnect(); }\n\n  setTabTo(t){ return () => this.setState({tab:t, count:9}); }\n\n  renderVals(){\n    const list = this.filtered();\n    const items = list.slice(0, this.state.count);\n    const t = this.state.tab;\n    const on = '#fff', onTxt='#14161b', off='transparent', offTxt='#6c727c';\n    const fo = this.state.filtersOpen;\n    return {\n      items,\n      totalLabel: String(list.length * 27),\n      gridCols: fo ? '256px 1fr' : '1fr',\n      filtersDisplay: fo ? 'block' : 'none',\n      cols: fo ? 3 : 4,\n      toggleLabel: fo ? 'Nascondi filtri' : 'Mostra filtri',\n      toggleIcon: fo ? '⟨' : '☰',\n      toggleFilters: () => this.setState(s=>({filtersOpen: !s.filtersOpen})),\n      hasMore: this.state.count < list.length,\n      allLoaded: this.state.count >= list.length,\n      shownLabel: Math.min(this.state.count, list.length) + ' di ' + list.length,\n      loadMore: () => { const total = this.filtered().length; this.setState(s=>({count: Math.min(s.count+6, total)})); },\n      setTab: { all: this.setTabTo('all'), design: this.setTabTo('design'), tech: this.setTabTo('tech') },\n      bgAll: t==='all'?on:off, cAll: t==='all'?onTxt:offTxt,\n      bgDesign: t==='design'?on:off, cDesign: t==='design'?onTxt:offTxt,\n      bgTech: t==='tech'?on:off, cTech: t==='tech'?onTxt:offTxt,\n      sentinel: (el)=>{ this._sentinel = el; if(el){ this.ensureObserver(); this._io.disconnect(); this._io.observe(el); } }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
